<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RUB / USD ⇄ VND</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2d0b6b">

    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Currency">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #2d0b6b 50%, #0d1f5c 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .5);
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 5px
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .45);
            font-size: .8rem;
            margin-bottom: 22px
        }

        /* Rate badges row */
        .badges {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 24px
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, .08);
            border-radius: 50px;
            padding: 6px 14px;
            font-size: .75rem;
        }

        .badge span {
            color: rgba(255, 255, 255, .55)
        }

        .badge strong {
            color: #b388ff
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #69f0ae;
            border-radius: 50%;
            animation: pulse 2s infinite;
            flex-shrink: 0
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .5;
                transform: scale(.7)
            }
        }

        /* Two-column row */
        .row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 0
        }

        .field {
            margin-bottom: 16px
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, .65);
            font-size: .75rem;
            font-weight: 600;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: .7px;
        }

        .wrap {
            position: relative
        }

        .sym {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, .4);
            font-size: 1rem;
            font-weight: 700;
            pointer-events: none;
            user-select: none;
        }

        input[type=text] {
            width: 100%;
            padding: 14px 12px 14px 36px;
            background: rgba(255, 255, 255, .09);
            border: 1.5px solid rgba(255, 255, 255, .12);
            border-radius: 13px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            outline: none;
            transition: border-color .2s, background .2s;
            letter-spacing: .4px;
        }

        input[type=text]:focus {
            border-color: #b388ff;
            background: rgba(179, 136, 255, .1)
        }

        /* Full-width VND field */
        .field-full {
            margin-bottom: 16px
        }

        .field-full label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, .65);
            font-size: .75rem;
            font-weight: 600;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: .7px;
        }

        .vnd-wrap {
            display: flex;
            align-items: center;
            position: relative;
            background: rgba(255, 255, 255, .09);
            border: 1.5px solid rgba(255, 255, 255, .12);
            border-radius: 13px;
            transition: border-color .2s, background .2s;
            padding-right: 16px;
        }

        .vnd-wrap:focus-within {
            border-color: #b388ff;
            background: rgba(179, 136, 255, .1);
        }

        .vnd-wrap input[type=text] {
            background: transparent;
            border: none;
            padding: 14px 4px 14px 44px;
            font-size: 1.3rem;
            margin-bottom: 0;
            flex: 1;
        }

        .vnd-wrap input[type=text]:focus {
            background: transparent;
            border: none;
        }

        .sym-vnd {
            left: 13px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, .4);
            position: absolute;
            font-weight: 700;
        }

        .vnd-zeros {
            color: rgba(255, 255, 255, .35);
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0 16px
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, .1)
        }

        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #7c4dff, #448aff);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: #fff;
            transition: transform .35s ease, box-shadow .2s;
            box-shadow: 0 4px 18px rgba(124, 77, 255, .45);
        }

        .swap-btn:hover {
            transform: rotate(180deg);
            box-shadow: 0 6px 24px rgba(124, 77, 255, .7)
        }

        .result-box {
            background: linear-gradient(135deg, rgba(124, 77, 255, .2), rgba(68, 138, 255, .2));
            border: 1px solid rgba(179, 136, 255, .3);
            border-radius: 16px;
            padding: 18px;
            margin-top: 8px;
            text-align: center;
        }

        .result-label {
            color: rgba(255, 255, 255, .45);
            font-size: .73rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px
        }

        .result-value {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.8
        }

        .result-value em {
            color: #b388ff;
            font-style: normal
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, .28);
            font-size: .7rem
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>&#x1F4B1; RUB / USD &#8644; VND</h1>
        <p class="subtitle">Конвертер валют &middot; 10 апреля 2026</p>

        <div class="badges">
            <div class="badge">
                <div class="dot"></div><span>1 &#8381;</span><strong>=&thinsp;324.8 ₫</strong>
            </div>
            <div class="badge">
                <div class="dot"></div><span>1 $</span><strong>=&thinsp;26 000 ₫</strong>
            </div>
            <div class="badge">
                <div class="dot"></div><span>1 $</span><strong>=&thinsp;80.05 &#8381;</strong>
            </div>
        </div>

        <!-- RUB + USD side by side -->
        <div class="row2">
            <div class="field">
                <label>&#127479;&#127482; Рубль</label>
                <div class="wrap">
                    <span class="sym">&#8381;</span>
                    <input type="text" id="rubIn" inputmode="decimal" placeholder="0" autocomplete="off" />
                </div>
            </div>
            <div class="field">
                <label>&#127482;&#127480; Доллар</label>
                <div class="wrap">
                    <span class="sym">$</span>
                    <input type="text" id="usdIn" inputmode="decimal" placeholder="0" autocomplete="off" />
                </div>
            </div>
        </div>

        <div class="divider">
            <hr />
            <button class="swap-btn" id="swapBtn" title="Свап">&#8645;</button>
            <hr />
        </div>

        <!-- VND full width -->
        <div class="field-full">
            <label>&#127483;&#127475; Вьетнамский донг</label>
            <div class="vnd-wrap">
                <span class="sym-vnd">₫</span>
                <input type="text" id="vndIn" inputmode="decimal" placeholder="0" autocomplete="off" />
                <span class="vnd-zeros">000</span>
            </div>
        </div>

        <div class="result-box">
            <div class="result-label">&#128202; Итог</div>
            <div class="result-value" id="resText">&mdash;</div>
        </div>

        <p class="footer">Источник: Расчёт USDT &middot; 10.04.2026</p>
    </div>

    <script>
        (function () {
            var USD_RUB = 80.05;   // 1 USD = 80.05 RUB
            var USD_VND = 26000;  // 1 USD = 26000 VND
            var RUB_VND = 324.8; // 1 RUB = 324.8 VND

            var rubEl = document.getElementById('rubIn');
            var usdEl = document.getElementById('usdIn');
            var vndEl = document.getElementById('vndIn');
            var resEl = document.getElementById('resText');
            var busy = false;

            function sep(str) {
                if (!str) return '';
                var p = String(str).split('.');
                p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, '\u2009');
                return p.join('.');
            }
            function clean(str) {
                return str.replace(/[\u2009\u00A0\s]/g, '');
            }
            function nice(n) {
                return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 2 }).format(n);
            }
            function fmt(n, dec) {
                return sep(parseFloat(n.toFixed(dec === undefined ? 2 : dec)).toString());
            }

            // Format input and restore caret
            function applyFmt(el) {
                var raw = el.value;
                var caret = el.selectionStart || 0;
                var pre = raw.slice(0, caret).replace(/[\u2009\u00A0\s]/g, '').length;

                var c = clean(raw).replace(/[^\d.]/g, '');
                var d = c.indexOf('.');
                if (d !== -1) c = c.slice(0, d + 1) + c.slice(d + 1).replace(/\./g, '');

                var f = sep(c);
                busy = true; el.value = f; busy = false;

                var cnt = 0, np = f.length;
                for (var i = 0; i < f.length; i++) {
                    if (f[i] !== '\u2009') cnt++;
                    if (cnt === pre) { np = i + 1; break; }
                }
                try { el.setSelectionRange(np, np); } catch (e) { }
                return c;
            }

            function setOthers(src, num) {
                busy = true;
                if (src === 'rub') {
                    usdEl.value = fmt(num / USD_RUB, 2);
                    var vndExact = num * RUB_VND;
                    var vndK = Math.round(vndExact / 1000 * 10) / 10; // keep one decimal for thousands
                    vndEl.value = fmt(vndK, 1);
                    resEl.innerHTML =
                        '<em>' + nice(num) + ' ₽</em> = ' +
                        '<em>$' + nice(num / USD_RUB) + '</em> = ' +
                        '<em>' + nice(vndExact) + ' ₫</em>';
                } else if (src === 'usd') {
                    rubEl.value = fmt(num * USD_RUB, 2);
                    var vndExact = num * USD_VND;
                    var vndK = Math.round(vndExact / 1000);
                    vndEl.value = fmt(vndK, 0);
                    resEl.innerHTML =
                        '<em>$' + nice(num) + '</em> = ' +
                        '<em>' + nice(num * USD_RUB) + ' ₽</em> = ' +
                        '<em>' + nice(vndExact) + ' ₫</em>';
                } else { // vnd
                    rubEl.value = fmt(num / RUB_VND, 2);
                    usdEl.value = fmt(num / USD_VND, 2);
                    resEl.innerHTML =
                        '<em>' + nice(num) + ' ₫</em> = ' +
                        '<em>' + nice(num / RUB_VND) + ' ₽</em> = ' +
                        '<em>$' + nice(num / USD_VND) + '</em>';
                }
                busy = false;
            }

            rubEl.addEventListener('input', function () {
                if (busy) return;
                var c = applyFmt(rubEl);
                var n = parseFloat(c);
                if (!c || isNaN(n)) { usdEl.value = ''; vndEl.value = ''; resEl.innerHTML = '&mdash;'; return; }
                setOthers('rub', n);
            });

            usdEl.addEventListener('input', function () {
                if (busy) return;
                var c = applyFmt(usdEl);
                var n = parseFloat(c);
                if (!c || isNaN(n)) { rubEl.value = ''; vndEl.value = ''; resEl.innerHTML = '&mdash;'; return; }
                setOthers('usd', n);
            });

            vndEl.addEventListener('input', function () {
                if (busy) return;
                var c = applyFmt(vndEl);
                var n = parseFloat(c);
                if (!c || isNaN(n)) { rubEl.value = ''; usdEl.value = ''; resEl.innerHTML = '&mdash;'; return; }
                setOthers('vnd', n * 1000);
            });

            // Swap: exchange RUB/USD values with VND
            document.getElementById('swapBtn').addEventListener('click', function () {
                var vndRaw = clean(vndEl.value);
                var numVndK = parseFloat(vndRaw);
                if (!vndRaw || isNaN(numVndK)) return;
                var numVnd = Math.round(numVndK * 1000);
                busy = true;
                rubEl.value = fmt(numVnd / RUB_VND, 2);
                usdEl.value = fmt(numVnd / USD_VND, 2);
                vndEl.value = fmt(numVndK, 1);
                busy = false;
                resEl.innerHTML =
                    '<em>' + nice(numVnd) + ' ₫</em> = ' +
                    '<em>' + nice(numVnd / RUB_VND) + ' ₽</em> = ' +
                    '<em>$' + nice(numVnd / USD_VND) + '</em>';
            });

            // Init: 1000 RUB default
            busy = true;
            rubEl.value = sep('1000');
            usdEl.value = fmt(1000 / USD_RUB, 2);
            var vndInitExact = 1000 * RUB_VND;
            var vndInitK = vndInitExact / 1000;
            vndEl.value = fmt(vndInitK, 1);
            busy = false;
            resEl.innerHTML =
                '<em>1 000 ₽</em> = <em>$' + nice(1000 / USD_RUB) + '</em> = <em>' + nice(vndInitExact) + ' ₫</em>';
        })();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
